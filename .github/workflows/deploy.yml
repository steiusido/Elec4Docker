name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------
  # 🧪 CI STAGE (TESTING)
  # ---------------------------
  test:
    runs-on: ubuntu-latest
    # Change 'your-username' to your actual GitHub handle
    if: github.actor != 'your-username'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Required for Vite 6+ / Tailwind Oxide

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ---------------------------
  # 🐳 BUILD + PUSH TO GHCR
  # ---------------------------
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # Runs if tests pass OR if tests were skipped because you pushed
    if: |
      always() && 
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/webapp:latest
          platforms: linux/amd64

  # ---------------------------
  # 🚀 DEPLOY TO RENDER
  # ---------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only deploy if the build was successful
    if: needs.build-and-push.result == 'success'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # ---------------------------
  # 📝 ERROR LOGGING
  # ---------------------------
  log-failure:
    needs: [test, build-and-push]
    # Runs ONLY if test or build failed
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log Error to bughist.md
        run: |
          TIMESTAMP=$(date "+%Y-%m-%d %H:%M:%S")
          USER="${{ github.actor }}"
          
          # Check if bughist.md exists, if not, create it with a header
          if [ ! -f bughist.md ]; then
            echo "# Bug History Log" > bughist.md
            echo "| Timestamp | User | Status |" >> bughist.md
            echo "| :--- | :--- | :--- |" >> bughist.md
          fi
          
          echo "| $TIMESTAMP | $USER | FAILED PUSH |" >> bughist.md
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bughist.md
          git commit -m "chore: log build failure for $USER at $TIMESTAMP [skip ci]"
          git push