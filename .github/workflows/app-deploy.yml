name: Production Gatekeeper

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Lint Check (Automatic Response)
        run: npm run lint
        
      - name: Verify Vite Build (The Ultimate Test)
        run: npm run build
        
      - name: Verify Dockerfile Structure
        run: docker build -t elec4-check -f ops/app.Dockerfile .